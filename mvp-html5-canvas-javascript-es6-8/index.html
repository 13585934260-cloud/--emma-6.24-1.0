<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="UTF-8">
<meta http-equiv="Cache-Control" content="no-cache, no-store, must-revalidate">
<meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no">
<title>三消游戏 MVP</title>
<style>
  *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
  html, body {
    overflow: hidden;
    touch-action: none;
  }
  body {
    background: #0f0f23;
    color: #e0e0e0;
    font-family: "Microsoft YaHei", "PingFang SC", Arial, sans-serif;
    display: flex;
    justify-content: center;
    align-items: center;
    min-height: 100vh;
    user-select: none;
    -webkit-user-select: none;
    -webkit-tap-highlight-color: transparent;
  }
  #app {
    display: flex;
    flex-direction: column;
    align-items: center;
    gap: 14px;
  }
 #info-bar {
   display: flex;
    justify-content: center;
    gap: 10px;
   width: 100%;
   max-width: 480px;
   font-size: 18px;
    padding: 0 4px;
    flex-wrap: wrap;
 }
 #info-bar .stat {
   background: #1a1a2e;
   padding: 8px 18px;
   border-radius: 6px;
   font-weight: 500;
 }
 #info-bar .stat b {
   color: #f0c040;
   font-size: 22px;
 }
  #info-bar .timer.stat b { color: #ff6b6b; }
  #info-bar .target.stat b { color: #4ecdc4; }
  #canvas-wrap {
    position: relative;
    border-radius: 8px;
    overflow: hidden;
    box-shadow: 0 0 40px rgba(0, 0, 0, 0.5);
  }
 canvas {
   display: block;
    touch-action: none;
   max-width: 100vw;
    max-height: 70vh;
    cursor: pointer;
  }
  #reset-btn {
    background: #2d2d5e;
    color: #ccc;
    border: 1px solid #444;
    padding: 10px 32px;
    font-size: 16px;
    border-radius: 6px;
    cursor: pointer;
    font-family: inherit;
    transition: background 0.15s;
  }
  #reset-btn:hover { background: #3d3d7e; color: #fff; }
</style>
</head>
<body>
<div id="app">
 <div id="info-bar">
    <span class="stat">关卡 <b id="level-val">1</b></span>
    <span class="stat timer">时间 <b id="timer-val">90</b></span>
    <span class="stat">分数 <b id="score-val">0</b></span>
    <span class="stat target">目标 <b id="target-val">500</b></span>
    <span class="stat">步数 <b id="moves-val">50</b></span>
  </div>
  <div id="canvas-wrap">
    <canvas id="game-canvas"></canvas>
  </div>
  <button id="reset-btn">重新开始</button>
</div>

<script>
(function() {
  'use strict';

  // ── 常量 ──────────────────────────────
  const ROWS = 8;
  const COLS = 8;
  const TILE_SIZE = 54;
  const GAP = 3;
  const PADDING = 16;
  const INITIAL_MOVES = 50;
  const POINTS_PER_TILE = 10;

 const COLORS = {
   1: '#E74C3C',
   2: '#3498DB',
   3: '#2ECC71',
   4: '#F1C40F',
   5: '#9B59B6',
   6: '#E67E22',
   0: '#1a1a2e'
 };

  const LEVELS = [
   { target: 500,  time: 90 },
    { target: 1000, time: 80 },
   { target: 1500, time: 70 },
    { target: 2500, time: 60 },
    { target: 4000, time: 55 },
    { target: 5500, time: 50 },
    { target: 7000, time: 45 },
    { target: 9000, time: 40 },
    { target: 11000,time: 35 },
    { target: 15000,time: 30 }
  ];

 const GRAPE_H = 7;
  const GRAPE_V = 8;
  const RAINBOW = 9;

  function isSpecial(v) { return v === GRAPE_H || v === GRAPE_V || v === RAINBOW; }

  // ═══════════════════════════════════════
  // Board 类 — 棋盘数据与操作
  // ═══════════════════════════════════════
  class Board {
    constructor(rows, cols) {
      this.rows = rows;
      this.cols = cols;
      this.grid = [];
    }

    // 生成无初始三连的随机棋盘
    generate(matchChecker) {
      this.grid = [];
      for (let r = 0; r < this.rows; r++) {
        this.grid[r] = [];
        for (let c = 0; c < this.cols; c++) {
          let value;
          let attempts = 0;
          do {
            value = Math.floor(Math.random() * 6) + 1;
            attempts++;
          } while (attempts < 200 && this._wouldMatch(r, c, value));
          this.grid[r][c] = value;
        }
      }
      // 全盘二次验证：如有遗漏的三连则重来
      if (matchChecker && matchChecker.findMatches(this.grid).length > 0) {
        this.generate(matchChecker);
      }
    }

    // 在 (row, col) 放置 value 是否会构成三连（仅检查左方与上方已放置的格子）
    _wouldMatch(row, col, value) {
      if (col >= 2 &&
          this.grid[row][col - 1] === value &&
          this.grid[row][col - 2] === value) return true;
      if (row >= 2 &&
          this.grid[row - 1][col] === value &&
          this.grid[row - 2][col] === value) return true;
      return false;
    }

    swap(r1, c1, r2, c2) {
      const t = this.grid[r1][c1];
      this.grid[r1][c1] = this.grid[r2][c2];
      this.grid[r2][c2] = t;
    }

    isAdjacent(r1, c1, r2, c2) {
      return Math.abs(r1 - r2) + Math.abs(c1 - c2) === 1;
    }

    isInBounds(r, c) {
      return r >= 0 && r < this.rows && c >= 0 && c < this.cols;
    }

    // 移除一组格子（置为 0）
    removeCells(cells) {
      for (const { row, col } of cells) {
        this.grid[row][col] = 0;
      }
    }

    // 重力下落：返回移动记录 [{fromRow, toRow, col}]
    applyGravity() {
      const moves = [];
      for (let c = 0; c < this.cols; c++) {
        let writeRow = this.rows - 1;
        for (let r = this.rows - 1; r >= 0; r--) {
          if (this.grid[r][c] !== 0) {
            if (r !== writeRow) {
              this.grid[writeRow][c] = this.grid[r][c];
              this.grid[r][c] = 0;
              moves.push({ fromRow: r, toRow: writeRow, col: c });
            }
            writeRow--;
          }
        }
      }
      return moves;
    }

    // 顶部补充新方块，返回被填充的格子 [{row, col}]
    fillEmpty() {
      const filled = [];
      for (let r = 0; r < this.rows; r++) {
        for (let c = 0; c < this.cols; c++) {
          if (this.grid[r][c] === 0) {
            this.grid[r][c] = Math.floor(Math.random() * 6) + 1;
            filled.push({ row: r, col: c });
          }
        }
      }
      return filled;
    }
  }

  // ═══════════════════════════════════════
  // Match 类 — 匹配检测
  // ═══════════════════════════════════════
 class Match {
    // 返回匹配分组 [{cells, length, orientation}]
    findMatchGroups(grid) {
      var rows = grid.length, cols = grid[0].length;
      var groups = [];
      // 横向扫描
      for (var r = 0; r < rows; r++) {
        var c = 0;
        while (c < cols) {
          var val = grid[r][c];
          if (val === 0 || isSpecial(val)) { c++; continue; }
          var count = 1;
          while (c + count < cols && grid[r][c + count] === val) count++;
          if (count >= 3) {
            var cells = [];
            for (var i = 0; i < count; i++) cells.push({row: r, col: c + i});
            groups.push({cells: cells, length: count, orientation: 'h'});
          }
          c += count;
        }
      }
      // 纵向扫描
      for (var cc = 0; cc < cols; cc++) {
        var rr = 0;
        while (rr < rows) {
          var val2 = grid[rr][cc];
          if (val2 === 0 || isSpecial(val2)) { rr++; continue; }
          var count2 = 1;
          while (rr + count2 < rows && grid[rr + count2][cc] === val2) count2++;
          if (count2 >= 3) {
            var cells2 = [];
            for (var j = 0; j < count2; j++) cells2.push({row: rr + j, col: cc});
            groups.push({cells: cells2, length: count2, orientation: 'v'});
          }
          rr += count2;
        }
      }
      return groups;
    }

    // 返回匹配格子的数组 [{row, col}, ...]
   findMatches(grid) {
      const rows = grid.length;
      const cols = grid[0].length;
      const matched = new Set();

      // 横向检测
      for (let r = 0; r < rows; r++) {
        for (let c = 0; c < cols - 2; c++) {
         const val = grid[r][c];
          if (val === 0 || isSpecial(val)) continue;
          let count = 1;
          while (c + count < cols && grid[r][c + count] === val) count++;
          if (count >= 3) {
            for (let i = 0; i < count; i++) matched.add(r + ',' + (c + i));
          }
        }
      }

      // 纵向检测
      for (let c = 0; c < cols; c++) {
        for (let r = 0; r < rows - 2; r++) {
         const val = grid[r][c];
          if (val === 0 || isSpecial(val)) continue;
          let count = 1;
          while (r + count < rows && grid[r + count][c] === val) count++;
          if (count >= 3) {
            for (let i = 0; i < count; i++) matched.add((r + i) + ',' + c);
          }
        }
      }

      return Array.from(matched).map(key => {
        const parts = key.split(',');
        return { row: +parts[0], col: +parts[1] };
      });
    }
  }

  // ═══════════════════════════════════════
  // Game 类 — 游戏主控、渲染、动画
  // ═══════════════════════════════════════
 class Game {
    constructor(canvas, scoreEl, movesEl, levelEl, timerEl, targetEl) {
     this.canvas = canvas;
     this.ctx = canvas.getContext('2d');
     this.scoreEl = scoreEl;
     this.movesEl = movesEl;
      this.levelEl = levelEl;
      this.timerEl = timerEl;
      this.targetEl = targetEl;

     this.board = new Board(ROWS, COLS);
     this.matcher = new Match();

      this.level = 1;
      this.timeLeft = LEVELS[0].time;
      this.targetScore = LEVELS[0].target;
      this.timerInterval = null;

     this.score = 0;
     this.totalScore = 0;
     this.movesLeft = INITIAL_MOVES;
     this.dragStart = null;
     this.state = 'idle';
      this.particles = [];

     // 动画状态
      this.animType = null;
      this.animProgress = 0;
      this.animDuration = 0;
      this.animData = null;
      this.animResolve = null;

      this.lastTime = 0;

     this._initCanvas();
      this._startTimer();
     this.board.generate(this.matcher);
     this._updateUI();

     this.fruitImages = {};
      this.grapeImg = new Image(); this.grapeImg.src = 'grape.png';
      this.rainbowImg = new Image(); this.rainbowImg.src = 'rainbow.png';
     this._loadFruitImages();

     this._swapTarget = null;
     this._turnFinished = false;
     this._inNextLevel = false;
      this.hintCells = null;
      this.hintTimer = null;
      this.floatingTexts = [];

     this.audioCtx = null;

     this.canvas.addEventListener('pointerdown', e => this._handlePointerDown(e), { passive: false });
      this.canvas.addEventListener('pointermove', e => this._handlePointerMove(e), { passive: false });
      this.canvas.addEventListener('pointerup', e => this._handlePointerUp(e), { passive: false });
     this.canvas.addEventListener('pointercancel', e => this._handlePointerUp(e), { passive: false });
      this.canvas.addEventListener('click', e => { if (this.state === 'levelup') this._nextLevel(); }, { passive: false });
     this._gameLoop = this._gameLoop.bind(this);
      this._animId = requestAnimationFrame(this._gameLoop);
    }

    _initCanvas() {
      var w = COLS * (TILE_SIZE + GAP) - GAP + PADDING * 2;
      var h = ROWS * (TILE_SIZE + GAP) - GAP + PADDING * 2;
      this.canvas.width = w;
      this.canvas.height = h;
    }

    _loadFruitImages() {
      for (var i = 1; i <= 6; i++) {
        var img = new Image();
        img.src = 'fruit_' + i + '.png';
        this.fruitImages[i] = img;
      }
    }

    _tileX(c) { return PADDING + c * (TILE_SIZE + GAP); }
    _tileY(r) { return PADDING + r * (TILE_SIZE + GAP); }

    _cellFromPos(clientX, clientY) {
      var rect = this.canvas.getBoundingClientRect();
      var sx = this.canvas.width / rect.width;
      var sy = this.canvas.height / rect.height;
      var x = (clientX - rect.left) * sx;
      var y = (clientY - rect.top) * sy;
      var c = Math.floor((x - PADDING) / (TILE_SIZE + GAP));
      var r = Math.floor((y - PADDING) / (TILE_SIZE + GAP));
      if (!this.board.isInBounds(r, c)) return null;
      var tx = this._tileX(c);
      var ty = this._tileY(r);
      if (x >= tx && x < tx + TILE_SIZE && y >= ty && y < ty + TILE_SIZE) {
        return { row: r, col: c };
      }
      return null;
    }

   _handlePointerDown(e) {
     e.preventDefault();
     if (this.state === 'animating') return;
      this._resetHintTimer();
     if (this.state === 'gameover') { this.restart(); return; }
      if (this.state === 'levelup') { this._nextLevel(); return; }
      if (this.state === 'timeup') { this.restart(); return; }
      if (this.state === 'allclear') { this.totalScore = 0; this.level = 1; this.restart(); return; }
     var cell = this._cellFromPos(e.clientX, e.clientY);
     if (!cell) return;
      var v = this.board.grid[cell.row][cell.col];
      // 点击葡萄直接激活
      if (v === GRAPE_H || v === GRAPE_V) {
        this._swapTarget = cell;
        this._activateGrape(cell.row, cell.col, v);
        return;
      }
     this.canvas.setPointerCapture(e.pointerId);
     this.dragStart = { row: cell.row, col: cell.col, ox: e.clientX, oy: e.clientY };
    }

   _handlePointerMove(e) {
      e.preventDefault();
      // keep for potential future visual feedback
    }

    _handlePointerUp(e) {
      e.preventDefault();
      if (!this.dragStart) return;
      this.canvas.releasePointerCapture(e.pointerId);
      var cell = this.dragStart;
      this.dragStart = null;

      var dx = e.clientX - cell.ox;
      var dy = e.clientY - cell.oy;
      var threshold = TILE_SIZE * 0.45;

      var target = null;
      if (Math.abs(dx) > Math.abs(dy) && Math.abs(dx) > threshold) {
        target = { row: cell.row, col: cell.col + (dx > 0 ? 1 : -1) };
      } else if (Math.abs(dy) > threshold) {
        target = { row: cell.row + (dy > 0 ? 1 : -1), col: cell.col };
      }

      if (target && this.board.isInBounds(target.row, target.col) &&
          this.board.isAdjacent(cell.row, cell.col, target.row, target.col)) {
        this._performSwap(cell, target);
      }
    }

   async _performSwap(cell1, cell2) {
      this._turnFinished = false;
      var v1 = this.board.grid[cell1.row][cell1.col];
      var v2 = this.board.grid[cell2.row][cell2.col];

     this.state = 'animating';

     // 彩虹果 + 超级葡萄 → 组合技
      this._resetHintTimer();
     if ((v1 === RAINBOW && (v2 === GRAPE_H || v2 === GRAPE_V)) ||
          (v2 === RAINBOW && (v1 === GRAPE_H || v1 === GRAPE_V))) {
        var grapeVal = (v1 === GRAPE_H || v1 === GRAPE_V) ? v1 : v2;
        await this._comboRainbowGrape(grapeVal);
        this._finishTurn();
        return;
      }

      // 彩虹果 + 普通水果 → 清除全场同类型
      if (v1 === RAINBOW && v2 >= 1 && v2 <= 6) {
        await this._activateRainbow(cell1, cell2, v2);
        this._finishTurn();
        return;
      }
      if (v2 === RAINBOW && v1 >= 1 && v1 <= 6) {
        await this._activateRainbow(cell2, cell1, v1);
        this._finishTurn();
        return;
      }

     this.board.swap(cell1.row, cell1.col, cell2.row, cell2.col);
      this._playSwap();
     this._swapTarget = cell2; // 交换终点用于放置特殊水果
     await this._animate('swap', 180, { cell1: cell1, cell2: cell2 });

      var matches = this.matcher.findMatches(this.board.grid);

     if (matches.length === 0) {
       this.board.swap(cell1.row, cell1.col, cell2.row, cell2.col);
       this._playInvalidSwap();
       await this._animate('swap_back', 180, { cell1: cell1, cell2: cell2 });
     } else {
       this.movesLeft--;
       this._playMatch(matches.length);
       try {
         await this._processChain(this._swapTarget);
       } catch (err) {
         console.error('PROCESS CHAIN ERROR', err);
       }
     }

      this._finishTurn();
    }

   _finishTurn() {
      if (this._turnFinished) return;
      this._turnFinished = true;
     if (this.score >= this.targetScore) {
        document.getElementById('reset-btn').textContent = '进入下一关';
       this.state = this.level >= LEVELS.length ? 'allclear' : 'levelup';
       this._stopTimer();
       this._updateUI();
        this._autoAdvance = setTimeout(function() { if (this.state === 'levelup') this._nextLevel(); }.bind(this), 5000);
       return;
      }
     if (this.movesLeft <= 0) {
        this.state = 'gameover';
      } else {
        this.state = 'idle';
        // 无解棋盘检测
        if (!this._findValidSwap()) {
          this.board.generate(this.matcher);
          this.hintCells = null;
        }
     }
     this._updateUI();
    }

    _checkLevelUp() {
      if (this.score >= this.targetScore) {
        this.state = this.level >= LEVELS.length ? 'allclear' : 'levelup';
        this._stopTimer();
        this._updateUI();
        return true;
      }
      return false;
    }

    async _processChain(swapTarget) {
      var groups = this.matcher.findMatchGroups(this.board.grid);

      while (groups.length > 0) {
        var fives = [], fours = [], threes = [], grapeGroups = [];
        for (var gi = 0; gi < groups.length; gi++) {
          var g = groups[gi];
          var hasGrape = false;
          for (var gj = 0; gj < g.cells.length; gj++) {
            var cv = this.board.grid[g.cells[gj].row][g.cells[gj].col];
            if (cv === GRAPE_H || cv === GRAPE_V) { hasGrape = true; break; }
          }
          if (hasGrape) { grapeGroups.push(g); }
          else if (g.length >= 5) { fives.push(g); }
          else if (g.length === 4) { fours.push(g); }
          else { threes.push(g); }
        }

       // 五连 → 彩虹果
        if (fives.length > 0) {
          var fcx = this._tileX(fives[0].cells[0].col) + TILE_SIZE / 2;
          var fcy = this._tileY(fives[0].cells[0].row) + TILE_SIZE / 2;
          this._addFloatingText(fcx, fcy, '5连!!', '#FFD700', 28);
        }
       for (var fi = 0; fi < fives.length; fi++) {
          var fg = fives[fi];
          for (var fj = 0; fj < fg.cells.length; fj++) this.board.grid[fg.cells[fj].row][fg.cells[fj].col] = 0;
          if (swapTarget && this.board.isInBounds(swapTarget.row, swapTarget.col)) {
            this.board.grid[swapTarget.row][swapTarget.col] = RAINBOW;
          }
          this.score += fg.cells.length * 5;
        }

       // 四连 → 超级葡萄
        if (fours.length > 0) {
          var frcx = this._tileX(fours[0].cells[0].col) + TILE_SIZE / 2;
          var frcy = this._tileY(fours[0].cells[0].row) + TILE_SIZE / 2;
          this._addFloatingText(frcx, frcy, '4连!', '#FF9800', 24);
        }
       for (var fri = 0; fri < fours.length; fri++) {
          var frg = fours[fri];
          var keepIdx = Math.floor(frg.cells.length / 2);
          for (var frj = 0; frj < frg.cells.length; frj++) {
            if (frj !== keepIdx) this.board.grid[frg.cells[frj].row][frg.cells[frj].col] = 0;
          }
          this.board.grid[frg.cells[keepIdx].row][frg.cells[keepIdx].col] = frg.orientation === 'h' ? GRAPE_H : GRAPE_V;
          this.score += frg.cells.length * 5;
        }

        // 葡萄参与匹配 → 激活
        for (var ggi = 0; ggi < grapeGroups.length; ggi++) {
          var gg = grapeGroups[ggi], grapeRow = -1, grapeCol = -1, grapeVal = 0;
          for (var ggj = 0; ggj < gg.cells.length; ggj++) {
            var gv = this.board.grid[gg.cells[ggj].row][gg.cells[ggj].col];
            if (gv === GRAPE_H || gv === GRAPE_V) { grapeRow = gg.cells[ggj].row; grapeCol = gg.cells[ggj].col; grapeVal = gv; break; }
          }
          if (grapeRow >= 0) {
            for (var ggk = 0; ggk < gg.cells.length; ggk++) this.board.grid[gg.cells[ggk].row][gg.cells[ggk].col] = 0;
            this._activateGrapeEffect(grapeRow, grapeCol, grapeVal);
          }
        }

        // 收集所有匹配格子用于粒子和三连移除
        var allMatched = [];
        for (var ai = 0; ai < groups.length; ai++) {
          for (var aj = 0; aj < groups[ai].cells.length; aj++) allMatched.push(groups[ai].cells[aj]);
        }
        var matchSet = new Set(allMatched.map(function(m) { return m.row + ',' + m.col; }));
        // 移除普通三连
        for (var ti = 0; ti < threes.length; ti++) {
          for (var tj = 0; tj < threes[ti].cells.length; tj++) {
            this.board.grid[threes[ti].cells[tj].row][threes[ti].cells[tj].col] = 0;
          }
        }
        this.score += (allMatched.length > 0 ? allMatched.length * 10 : 0);
        this._updateUI();

       // 果汁粒子喷射
        for (var smi = 0; smi < allMatched.length; smi++) {
          var smc = allMatched[smi];
          if (threes.length > 0 || grapeGroups.length > 0) {
            this._addFloatingText(this._tileX(smc.col) + TILE_SIZE / 2, this._tileY(smc.row) + TILE_SIZE / 2, '+10', '#FFD700', 14);
          }
        }
       if (allMatched.length > 0) this._playMatch(allMatched.length);
       for (var mi = 0; mi < allMatched.length; mi++) {
          var mc = allMatched[mi];
          var color = COLORS[1 + Math.floor(Math.random() * 6)];
          this._spawnParticles(this._tileX(mc.col) + TILE_SIZE / 2, this._tileY(mc.row) + TILE_SIZE / 2, color);
        }

       await this._animate('remove', 200, { cellSet: matchSet });

       var fallMoves = this.board.applyGravity();

        if (fallMoves.length > 0) {
          var fallMap = new Map();
          for (var i = 0; i < fallMoves.length; i++) {
            var m = fallMoves[i];
            fallMap.set(m.toRow + ',' + m.col, m.fromRow);
          }
          await this._animate('fall', 280, { fallMap: fallMap });
       }

        var filled = this.board.fillEmpty();
        if (filled.length > 0) {
          var fillSet = new Set(filled.map(function(f) { return f.row + ',' + f.col; }));
          await this._animate('fill', 200, { cellSet: fillSet });
        }

        groups = this.matcher.findMatchGroups(this.board.grid);
     }
    }

    _animate(type, duration, data) {
      var self = this;
      return new Promise(function(resolve) {
        self.animType = type;
        self.animDuration = duration;
        self.animProgress = 0;
        self.animData = data;
        self.animResolve = resolve;
      });
    }

   _gameLoop(timestamp) {
     if (!this.lastTime) this.lastTime = timestamp;
     var dt = Math.min(timestamp - this.lastTime, 50);
     this.lastTime = timestamp;

      // 每帧检测关卡完成——最高优先级
     if (this.state === 'idle' && this.score >= this.targetScore && this.targetScore > 0) {
       this._stopTimer();
       this._updateUI();
        this.state = this.level >= LEVELS.length ? 'allclear' : 'levelup';
     }

     if (this.animType) {
        this.animProgress += dt;
        if (this.animProgress >= this.animDuration) {
          this.animProgress = this.animDuration;
          var resolve = this.animResolve;
          this.animType = null;
          this.animData = null;
          this.animResolve = null;
          if (resolve) resolve();
        }
     }

      // 浮动文字更新
      for (var fi = this.floatingTexts.length - 1; fi >= 0; fi--) {
        var ft = this.floatingTexts[fi];
        ft.y += ft.vy;
        ft.life -= 0.02;
        if (ft.life <= 0) this.floatingTexts.splice(fi, 1);
      }

     // 粒子更新
      for (var pi = this.particles.length - 1; pi >= 0; pi--) {
        var p = this.particles[pi];
        p.x += p.vx;
        p.y += p.vy;
        p.vy += 0.12;
        p.life -= 0.025;
        if (p.life <= 0) this.particles.splice(pi, 1);
      }

     this._render();
      this._animId = requestAnimationFrame(this._gameLoop);
    }

    _render() {
      var ctx = this.ctx;
      var W = this.canvas.width;
      var H = this.canvas.height;
      var t = this.animType ? this.animProgress / this.animDuration : 0;

      ctx.clearRect(0, 0, W, H);
      ctx.fillStyle = '#0f0f23';
      ctx.fillRect(0, 0, W, H);

      // 棋盘底色
      var bx = PADDING - 4, by = PADDING - 4;
      var bw = COLS * (TILE_SIZE + GAP) - GAP + 8;
      var bh = ROWS * (TILE_SIZE + GAP) - GAP + 8;
      ctx.fillStyle = '#141428';
      this._roundRect(bx, by, bw, bh, 6);
      ctx.fill();

      // 绘制所有格子
      for (var r = 0; r < ROWS; r++) {
        for (var c = 0; c < COLS; c++) {
          var value = this.board.grid[r][c];
          var dx = this._tileX(c);
          var dy = this._tileY(r);
          var alpha = 1;
          var scale = 1;

          if (this.animType === 'swap' || this.animType === 'swap_back') {
            var cell1 = this.animData.cell1;
            var cell2 = this.animData.cell2;
            if (r === cell1.row && c === cell1.col) {
              dx = this._lerp(this._tileX(cell2.col), this._tileX(cell1.col), t);
              dy = this._lerp(this._tileY(cell2.row), this._tileY(cell1.row), t);
            } else if (r === cell2.row && c === cell2.col) {
              dx = this._lerp(this._tileX(cell1.col), this._tileX(cell2.col), t);
              dy = this._lerp(this._tileY(cell1.row), this._tileY(cell2.row), t);
            }
          } else if (this.animType === 'remove') {
            if (this.animData.cellSet.has(r + ',' + c)) {
              alpha = 1 - t;
              scale = 1 - t * 0.5;
            }
          } else if (this.animType === 'fall') {
            var fromRow = this.animData.fallMap.get(r + ',' + c);
            if (fromRow !== undefined) {
              var et = this._easeOutQuad(t);
              dy = this._lerp(this._tileY(fromRow), this._tileY(r), et);
            }
          } else if (this.animType === 'fill') {
            if (this.animData.cellSet.has(r + ',' + c)) {
              alpha = t;
              scale = 0.3 + t * 0.7;
            }
          }

          if (alpha > 0.005 && value !== 0) {
            this._drawTile(value, dx, dy, alpha, scale);
          }
        }
      }

      // 拖拽高亮
      if (this.dragStart && this.state === 'idle') {
        var sc = this.dragStart;
        var sx = this._tileX(sc.col), sy = this._tileY(sc.row);
        ctx.save();
        ctx.strokeStyle = '#FFF';
        ctx.lineWidth = 3;
        ctx.shadowColor = '#FFF';
        ctx.shadowBlur = 10;
        this._roundRect(sx, sy, TILE_SIZE, TILE_SIZE, 5);
        ctx.stroke();
        ctx.restore();
     }

     // 绘制粒子

      // 绘制提示闪烁
      if (this.hintCells && this.state === 'idle') {
        var pulse = Math.sin(Date.now() * 0.005) * 0.4 + 0.6;
        for (var hi = 0; hi < this.hintCells.length; hi++) {
          var hc = this.hintCells[hi];
          ctx.save();
          ctx.strokeStyle = 'rgba(255, 220, 100, ' + (0.5 + pulse * 0.5) + ')';
          ctx.lineWidth = 3 + pulse * 2;
          var hx = this._tileX(hc.col) - 2, hy = this._tileY(hc.row) - 2;
          this._roundRect(hx, hy, TILE_SIZE + 4, TILE_SIZE + 4, 7);
          ctx.stroke();
          ctx.restore();
        }
      }

      // 绘制浮动文字
      for (var fti = 0; fti < this.floatingTexts.length; fti++) {
        var fta = this.floatingTexts[fti];
        ctx.save();
        ctx.globalAlpha = fta.life;
        ctx.fillStyle = fta.color;
        ctx.font = 'bold ' + fta.size + 'px "Microsoft YaHei", Arial, sans-serif';
        ctx.textAlign = 'center';
        ctx.textBaseline = 'middle';
        ctx.shadowColor = 'rgba(0,0,0,0.5)';
        ctx.shadowBlur = 3;
        ctx.fillText(fta.text, fta.x, fta.y);
        ctx.restore();
      }

     for (var pi = 0; pi < this.particles.length; pi++) {
        var p = this.particles[pi];
        ctx.globalAlpha = p.life;
        ctx.fillStyle = p.color;
        ctx.beginPath();
        ctx.arc(p.x, p.y, p.size * (0.5 + p.life * 0.5), 0, Math.PI * 2);
        ctx.fill();
      }
      ctx.globalAlpha = 1;

      // 游戏结束 / 过关 / 超时遮罩
      if (this.state === 'gameover' || this.state === 'levelup' || this.state === 'timeup' || this.state === 'allclear') {
       ctx.fillStyle = 'rgba(10, 10, 30, 0.78)';
       ctx.fillRect(0, 0, W, H);
       ctx.fillStyle = '#FFF';
       ctx.font = 'bold 30px "Microsoft YaHei", Arial, sans-serif';
       ctx.textAlign = 'center';
       ctx.textBaseline = 'middle';
       if (this.state === 'levelup') {
          ctx.fillText('第 ' + this.level + ' 关 过关！', W / 2, H / 2 - 50);
         ctx.fillStyle = '#f0c040';
         ctx.font = 'bold 40px "Microsoft YaHei", Arial, sans-serif';
          ctx.fillText('⭐', W / 2, H / 2 - 5);
          // 按钮背景
          var btnX = W / 2 - 100, btnY = H / 2 + 55, btnW = 200, btnH = 40;
          var pulse = Math.sin(Date.now() * 0.004) * 0.3 + 0.7;
          ctx.fillStyle = 'rgba(76, 175, 80, ' + (0.5 + pulse * 0.3) + ')';
          ctx.beginPath();
          this._roundRect(btnX, btnY, btnW, btnH, 10);
          ctx.fill();
          ctx.strokeStyle = 'rgba(255,255,255,' + (0.6 + pulse * 0.4) + ')';
          ctx.lineWidth = 2;
          ctx.stroke();
          // 按钮文字
          ctx.fillStyle = '#FFF';
          ctx.font = 'bold 18px "Microsoft YaHei", Arial, sans-serif';
          ctx.fillText('进入下一关 ▶', W / 2, btnY + btnH / 2);
          // 分数信息
          ctx.font = '15px "Microsoft YaHei", Arial, sans-serif';
          ctx.fillStyle = '#999';
          ctx.fillText('得分: ' + this.score + ' / 目标: ' + this.targetScore, W / 2, H / 2 + 120);
       } else if (this.state === 'allclear') {
          ctx.fillText('🎉 全部通关！', W / 2, H / 2 - 28);
          ctx.font = '19px "Microsoft YaHei", Arial, sans-serif';
          ctx.fillText('累计总分: ' + (this.totalScore + this.score), W / 2, H / 2 + 18);
          ctx.font = '15px "Microsoft YaHei", Arial, sans-serif';
          ctx.fillStyle = '#999';
          ctx.fillText('点击重新开始', W / 2, H / 2 + 54);
        } else if (this.state === 'timeup') {
          ctx.fillText('时间到！', W / 2, H / 2 - 28);
          ctx.font = '19px "Microsoft YaHei", Arial, sans-serif';
          ctx.fillText('得分: ' + this.score + ' / 目标: ' + this.targetScore, W / 2, H / 2 + 18);
          ctx.font = '15px "Microsoft YaHei", Arial, sans-serif';
          ctx.fillStyle = '#999';
          ctx.fillText('点击重试本关', W / 2, H / 2 + 54);
        } else {
          ctx.fillText('游戏结束', W / 2, H / 2 - 28);
          ctx.font = '19px "Microsoft YaHei", Arial, sans-serif';
          ctx.fillText('最终分数: ' + this.score, W / 2, H / 2 + 18);
          ctx.font = '15px "Microsoft YaHei", Arial, sans-serif';
          ctx.fillStyle = '#999';
          ctx.fillText('拖拽方块重新开始', W / 2, H / 2 + 54);
        }
      }
    }

    _drawTile(value, x, y, alpha, scale) {
      var ctx = this.ctx;
      ctx.save();
      ctx.globalAlpha = alpha;

      var hs = TILE_SIZE / 2;
      var cx = x + hs, cy = y + hs;
      ctx.translate(cx, cy);
      ctx.scale(scale, scale);
      ctx.translate(-cx, -cy);

     // 阴影
     ctx.shadowColor = 'rgba(0,0,0,0.35)';
      ctx.shadowBlur = 5;
      ctx.shadowOffsetY = 2;

     // 水果图片 或 纯色填充（图片未加载时的回退）
      var img;
      if (value === GRAPE_H || value === GRAPE_V) {
        img = this.grapeImg;
      } else if (value === RAINBOW) {
        img = this.rainbowImg;
      } else {
        img = this.fruitImages[value];
      }

      if (img && img.complete && img.naturalWidth > 0) {
        ctx.imageSmoothingEnabled = true;
        ctx.imageSmoothingQuality = 'high';
        // 特殊水果脉冲光晕
        if (value === GRAPE_H || value === GRAPE_V || value === RAINBOW) {
          var glowAlpha = 0.3 + Math.sin(Date.now() * 0.005) * 0.2;
          ctx.shadowColor = value === RAINBOW ? '#FFD700' : '#00FF88';
          ctx.shadowBlur = 8 + Math.sin(Date.now() * 0.005) * 4;
        }
        // 圆角裁剪
        ctx.beginPath();
        this._roundRect(x + 1, y + 1, TILE_SIZE - 2, TILE_SIZE - 2, 5);
        ctx.clip();
        ctx.drawImage(img, x + 1, y + 1, TILE_SIZE - 2, TILE_SIZE - 2);
        // 葡萄方向标记
        if (value === GRAPE_H || value === GRAPE_V) {
          ctx.shadowColor = 'transparent';
          ctx.shadowBlur = 0;
          ctx.fillStyle = '#FFF';
          ctx.font = 'bold 14px Arial';
          ctx.textAlign = 'center';
          ctx.textBaseline = 'middle';
          var mark = value === GRAPE_H ? '←→' : '↑↓';
          ctx.fillText(mark, x + TILE_SIZE / 2, y + TILE_SIZE - 10);
        }
     } else {
        var fallbackColor = value === GRAPE_H || value === GRAPE_V ? '#44FF88' : (value === RAINBOW ? '#FFD700' : (COLORS[value] || '#334'));
        ctx.fillStyle = fallbackColor;
        this._roundRect(x + 1, y + 1, TILE_SIZE - 2, TILE_SIZE - 2, 5);
        ctx.fill();
      }

     ctx.restore();
    }

    _roundRect(x, y, w, h, r) {
      var ctx = this.ctx;
      if (typeof r === 'number') r = [r, r, r, r];
      ctx.beginPath();
      ctx.moveTo(x + r[0], y);
      ctx.lineTo(x + w - r[1], y);
      ctx.quadraticCurveTo(x + w, y, x + w, y + r[1]);
      ctx.lineTo(x + w, y + h - r[2]);
      ctx.quadraticCurveTo(x + w, y + h, x + w - r[2], y + h);
      ctx.lineTo(x + r[3], y + h);
      ctx.quadraticCurveTo(x, y + h, x, y + h - r[3]);
      ctx.lineTo(x, y + r[0]);
      ctx.quadraticCurveTo(x, y, x + r[0], y);
      ctx.closePath();
    }

    _lerp(a, b, t) { return a + (b - a) * t; }
    _easeOutQuad(t) { return t * (2 - t); }

   _spawnParticles(x, y, color) {
     var count = 6 + Math.floor(Math.random() * 5);
      for (var j = 0; j < count; j++) {
        var angle = Math.random() * Math.PI * 2;
        var speed = 1.2 + Math.random() * 3.5;
        this.particles.push({
          x: x, y: y,
          vx: Math.cos(angle) * speed,
          vy: Math.sin(angle) * speed - 1.5,
          life: 1.0,
          color: color,
          size: 2 + Math.random() * 4
        });
      }
    }

    _ensureAudio() {
      if (!this.audioCtx) {
        this.audioCtx = new (window.AudioContext || window.webkitAudioContext)();
      }
      if (this.audioCtx.state === 'suspended') this.audioCtx.resume();
      return this.audioCtx;
    }

    _playTone(freq, duration, type, vol, rampTarget) {
      var ctx = this._ensureAudio();
      var osc = ctx.createOscillator();
      var gain = ctx.createGain();
      osc.type = type || 'sine';
      osc.connect(gain);
      gain.connect(ctx.destination);
      osc.frequency.setValueAtTime(freq, ctx.currentTime);
      if (rampTarget) osc.frequency.linearRampToValueAtTime(rampTarget, ctx.currentTime + duration);
      gain.gain.setValueAtTime(vol || 0.12, ctx.currentTime);
      gain.gain.exponentialRampToValueAtTime(0.001, ctx.currentTime + duration);
      osc.start(ctx.currentTime);
      osc.stop(ctx.currentTime + duration);
    }

    _playSwap() {
      var self = this;
      this._playTone(440, 0.06, 'sine', 0.1);
      setTimeout(function() { self._playTone(660, 0.06, 'sine', 0.1); }, 50);
    }

    _playInvalidSwap() {
      this._playTone(220, 0.15, 'triangle', 0.1, 150);
    }

    _playMatch(count) {
      var n = Math.min(count || 3, 6);
      var base = 440 + n * 30;
      for (var i = 0; i < n; i++) {
        this._playTone(base + i * 80, 0.08, 'sine', 0.07);
      }
    }

    _playGrape() {
      var self = this;
      this._playTone(330, 0.15, 'sawtooth', 0.08, 880);
      setTimeout(function() { self._playTone(660, 0.15, 'sawtooth', 0.06, 1320); }, 100);
    }

    _playRainbow() {
      for (var i = 0; i < 5; i++) {
        this._playTone(440 + i * 165, 0.1, 'sine', 0.07);
      }
    }

    _playCombo() {
      var self = this;
      this._playTone(220, 0.2, 'square', 0.1, 880);
      setTimeout(function() {
        for (var i = 0; i < 8; i++) self._playTone(440 + i * 110, 0.08, 'sine', 0.06);
      }, 100);
   }

    _resetHintTimer() {
      if (this.hintTimer) clearTimeout(this.hintTimer);
      this.hintCells = null;
      if (this.state !== 'idle') return;
      var self = this;
      this.hintTimer = setTimeout(function() { self._showHint(); }, 4000);
    }

    _showHint() {
      if (this.state !== 'idle') return;
      var result = this._findValidSwap();
      if (result) this.hintCells = result;
    }

    _findValidSwap() {
      for (var r = 0; r < ROWS; r++) {
        for (var c = 0; c < COLS; c++) {
          var v = this.board.grid[r][c];
          if (isSpecial(v) || v === 0) continue;
          if (c + 1 < COLS && this.board.grid[r][c + 1] !== 0 && !isSpecial(this.board.grid[r][c + 1])) {
            this.board.swap(r, c, r, c + 1);
            var m = this.matcher.findMatches(this.board.grid).length;
            this.board.swap(r, c, r, c + 1);
            if (m > 0) return [{row: r, col: c}, {row: r, col: c + 1}];
          }
          if (r + 1 < ROWS && this.board.grid[r + 1][c] !== 0 && !isSpecial(this.board.grid[r + 1][c])) {
            this.board.swap(r, c, r + 1, c);
            var m2 = this.matcher.findMatches(this.board.grid).length;
            this.board.swap(r, c, r + 1, c);
            if (m2 > 0) return [{row: r, col: c}, {row: r + 1, col: c}];
          }
        }
      }
      return null;
    }

    _addFloatingText(x, y, text, color, size) {
      this.floatingTexts.push({ x: x, y: y, text: text, life: 1.0, vy: -1.2, color: color || '#FFF', size: size || 18 });
    }

   _updateUI() {
     this.scoreEl.textContent = this.score;
     this.movesEl.textContent = this.movesLeft;
     this.levelEl.textContent = this.level;
     this.timerEl.textContent = this.timeLeft;
   this.targetEl.textContent = this.targetScore;


     // 自动检测关卡完成
     var rbtn = document.getElementById('reset-btn');
     if (this.state !== 'levelup' && this.state !== 'allclear' && this.state !== 'timeup' && this.score >= this.targetScore) {
       this.state = this.level >= LEVELS.length ? 'allclear' : 'levelup';
       this._stopTimer();
        this._autoAdvance = setTimeout(function() { if (this.state === 'levelup') this._nextLevel(); }.bind(this), 5000);
     }
      if (this.state === 'levelup' || this.state === 'allclear') {
        rbtn.textContent = '进入下一关';
      } else {
        rbtn.textContent = '重新开始';
      }
    }

    _startTimer() {
      this._stopTimer();
      var self = this;
      this.timerInterval = setInterval(function() {
        if (self.state === 'animating' || self.state === 'levelup' || self.state === 'timeup') return;
        self.timeLeft--;
        var minutes = Math.floor(self.timeLeft / 60);
        var seconds = self.timeLeft % 60;
        self.timerEl.textContent = self.timeLeft;
        if (self.timeLeft <= 10) self.timerEl.style.color = '#ff4444';
        else self.timerEl.style.color = '#f0c040';
        if (self.timeLeft <= 0) {
          self._stopTimer();
          self.state = 'timeup';
        }
      }, 1000);
    }

    _stopTimer() {
      if (this.timerInterval) { clearInterval(this.timerInterval); this.timerInterval = null; }
    }

   _nextLevel() {
     if (this._autoAdvance) { clearTimeout(this._autoAdvance); this._autoAdvance = null; }
     this._resetHintTimer();
     if (this._inNextLevel) return;
     this._inNextLevel = true;
     this._stopTimer();
     this.level = this.level + 1;
      this.levelEl.textContent = this.level;
     if (this.level > LEVELS.length) {
       this.state = 'allclear';
       this._inNextLevel = false;
       return;
     }
     var cfg = LEVELS[this.level - 1];
     this.targetScore = cfg.target;
     this.timeLeft = cfg.time;
     this.score = 0;
     this.movesLeft = INITIAL_MOVES;
     this.timerEl.style.color = '#f0c040';
     this.board.generate(this.matcher);
     this.state = 'idle';
     this._updateUI();
     this.particles = [];
     this.dragStart = null;
      this.hintCells = null;
      this.floatingTexts = [];
     this._swapTarget = null;
     this.animType = null;
     this.animData = null;
     this._startTimer();
     var self = this;
     setTimeout(function() { self._inNextLevel = false; }, 500);
    }

    _timeUp() {
      this._stopTimer();
      this.state = 'timeup';
    }

    _activateGrape(row, col, value) {
      this._turnFinished = false;
      this.movesLeft--;
      this._updateUI();
      this.state = 'animating';
      this._swapTarget = {row: row, col: col};
      // 清除格子后立即激活
     var cleared = [];
      this._playGrape();
     if (value === GRAPE_H) {
        for (var cc = 0; cc < COLS; cc++) {
          if (this.board.grid[row][cc] !== 0) {
            if (cc !== col) this.board.grid[row][cc] = 0;
            cleared.push({row: row, col: cc});
          }
        }
      } else {
        for (var rr = 0; rr < ROWS; rr++) {
          if (this.board.grid[rr][col] !== 0) {
            if (rr !== row) this.board.grid[rr][col] = 0;
            cleared.push({row: rr, col: col});
          }
        }
      }
      this.board.grid[row][col] = 0;
      this.score += cleared.length * 10;
      this._updateUI();
      // 粒子
      for (var ci = 0; ci < cleared.length; ci++) {
        this._spawnParticles(this._tileX(cleared[ci].col) + TILE_SIZE / 2, this._tileY(cleared[ci].row) + TILE_SIZE / 2, COLORS[1 + Math.floor(Math.random() * 6)]);
      }
     // 继续链式处理
     var self2 = this;
      setTimeout(async function() {
        var fallMoves = self2.board.applyGravity();
        if (fallMoves.length > 0) {
          var fallMap = new Map();
          for (var fm = 0; fm < fallMoves.length; fm++) {
            fallMap.set(fallMoves[fm].toRow + ',' + fallMoves[fm].col, fallMoves[fm].fromRow);
          }
          await self2._animate('fall', 280, { fallMap: fallMap });
        }
        var filled = self2.board.fillEmpty();
        if (filled.length > 0) {
          var fillSet = new Set(filled.map(function(f) { return f.row + ',' + f.col; }));
          await self2._animate('fill', 200, { cellSet: fillSet });
        }
        await self2._processChain(self2._swapTarget);
        self2._finishTurn();
      }, 100);
    }

   _activateGrapeEffect(row, col, value) {
      this._playGrape();
     if (value === GRAPE_H) {
        for (var cc = 0; cc < COLS; cc++) {
          if (this.board.grid[row][cc] !== 0) {
            this.board.grid[row][cc] = 0;
            this.score += 10;
          }
        }
      } else {
        for (var rr = 0; rr < ROWS; rr++) {
          if (this.board.grid[rr][col] !== 0) {
            this.board.grid[rr][col] = 0;
            this.score += 10;
          }
        }
      }
      this._updateUI();
    }

    async _activateRainbow(rainbowCell, targetCell, targetType) {
     this.board.swap(rainbowCell.row, rainbowCell.col, targetCell.row, targetCell.col);
      this._playRainbow();
     await this._animate('swap', 180, { cell1: rainbowCell, cell2: targetCell });
      var cleared = [];
      for (var r = 0; r < ROWS; r++) {
        for (var c = 0; c < COLS; c++) {
          if (this.board.grid[r][c] === targetType) {
            this.board.grid[r][c] = 0;
            cleared.push({row: r, col: c});
          }
        }
      }
      this.board.grid[targetCell.row][targetCell.col] = 0;
     this.movesLeft--;
      this.score += cleared.length * 10;
      this._updateUI();
      // 粒子
      for (var ci = 0; ci < cleared.length; ci++) {
        this._spawnParticles(this._tileX(cleared[ci].col) + TILE_SIZE / 2, this._tileY(cleared[ci].row) + TILE_SIZE / 2, COLORS[targetType]);
      }
      // 下落填充
      var fallMoves = this.board.applyGravity();
      if (fallMoves.length > 0) {
        var fallMap = new Map();
        for (var fm = 0; fm < fallMoves.length; fm++) fallMap.set(fallMoves[fm].toRow + ',' + fallMoves[fm].col, fallMoves[fm].fromRow);
        await this._animate('fall', 280, { fallMap: fallMap });
      }
      var filled = this.board.fillEmpty();
      if (filled.length > 0) {
        var fillSet = new Set(filled.map(function(f) { return f.row + ',' + f.col; }));
        await this._animate('fill', 200, { cellSet: fillSet });
      }
      await this._processChain(this._swapTarget);
    }

   async _comboRainbowGrape(grapeVal) {
      this._playCombo();
     this.movesLeft--;
      this._updateUI();
      // 将所有普通水果(1-6)转换为同方向葡萄
      var converted = [];
      for (var r = 0; r < ROWS; r++) {
        for (var c = 0; c < COLS; c++) {
          if (this.board.grid[r][c] >= 1 && this.board.grid[r][c] <= 6) {
            this.board.grid[r][c] = grapeVal;
            converted.push({row: r, col: c});
          }
        }
      }
      // 激活所有葡萄
      for (var ci = 0; ci < converted.length; ci++) {
        this._activateGrapeEffect(converted[ci].row, converted[ci].col, grapeVal);
      }
      // 下落填充
      var fallMoves = this.board.applyGravity();
      if (fallMoves.length > 0) {
        var fallMap = new Map();
        for (var fm = 0; fm < fallMoves.length; fm++) fallMap.set(fallMoves[fm].toRow + ',' + fallMoves[fm].col, fallMoves[fm].fromRow);
        await this._animate('fall', 280, { fallMap: fallMap });
      }
      var filled = this.board.fillEmpty();
      if (filled.length > 0) {
        var fillSet = new Set(filled.map(function(f) { return f.row + ',' + f.col; }));
        await this._animate('fill', 200, { cellSet: fillSet });
      }
      await this._processChain(this._swapTarget);
    }

   restart() {
     this._resetHintTimer();
     this._stopTimer();
      var cfg = LEVELS[this.level - 1];
     this.score = 0;
     this.movesLeft = INITIAL_MOVES;
      this.timeLeft = cfg.time;
      this.targetScore = cfg.target;
     this.timerEl.style.color = '#f0c040';
     this.dragStart = null;
      this._swapTarget = null;
     this.particles = [];
     this.state = 'idle';
      this.animType = null;
      this.animData = null;
      this._startTimer();
     this.board.generate(this.matcher);
      this._updateUI();
    }

    destroy() {
      if (this._animId) cancelAnimationFrame(this._animId);
      if (this.timerInterval) { clearInterval(this.timerInterval); this.timerInterval = null; }
      if (this.hintTimer) { clearTimeout(this.hintTimer); this.hintTimer = null; }
      if (this._autoAdvance) { clearTimeout(this._autoAdvance); this._autoAdvance = null; }
    }
  }

  // ── 启动 ──────────────────────────────
 var canvas = document.getElementById('game-canvas');
 var scoreEl = document.getElementById('score-val');
 var movesEl = document.getElementById('moves-val');
  var levelEl = document.getElementById('level-val');
  var timerEl = document.getElementById('timer-val');
 var targetEl = document.getElementById('target-val');
 var resetBtn = document.getElementById('reset-btn');

 var game = new Game(canvas, scoreEl, movesEl, levelEl, timerEl, targetEl);
  resetBtn.addEventListener('click', function() {
    if (game.state === 'levelup') { game._nextLevel(); }
    else if (game.state === 'allclear') { game.totalScore = 0; game.restart(); }
    else { game.restart(); }
  });

})();
</script>
</body>
